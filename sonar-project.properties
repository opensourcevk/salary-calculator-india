sonar.projectKey=salary-calculator-india
sonar.organization=salary-calculator-india

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=salary-calculator-india
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude test files from coverage
sonar.exclusions=**/*.test.js,**/*.test.jsx

# Test files
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# LCOV coverage report path
sonar.javascript.lcov.reportPaths=coverage/lcov.info